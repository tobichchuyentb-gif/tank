<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tank War Online</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      /* Ngăn chặn tuyệt đối hành vi cuộn/phóng to mặc định trên thiết bị cảm ứng */
      touch-action: none; 
    }
    body {
      background-color: #1a1a1a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Màn hình giao diện chính */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #2c3e50 0%, #0f171e 100%);
      z-index: 10;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .hidden {
      display: none !important;
      opacity: 0;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #3498db;
      color: #3498db;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }

    input {
      background: #2c3e50;
      color: #fff;
      border: 1px solid #34495e;
    }
    input:focus {
      outline: none;
      border-color: #3498db;
    }

    button {
      background: #3498db;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2980b9;
    }
    button.secondary {
      background: #2ecc71;
    }
    button.secondary:hover {
      background: #27ae60;
    }
    button:disabled {
      background: #7f8c8d;
      cursor: not-allowed;
    }

    /* Giao diện phòng chờ */
    .player-list {
      text-align: left;
      margin: 15px 0;
      max-height: 150px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 6px;
    }
    .player-item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
    }

    /* Màn hình game */
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    /* Bản đồ thi đấu nền trắng sạch sẽ */
    canvas {
      background: #ffffff; 
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* Overlays trên HUD Game */
    .hud {
      position: absolute;
      top: 10px;
      pointer-events: none;
      font-family: monospace;
      font-weight: bold;
    }
    #timer-display {
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.8rem;
      background: rgba(0,0,0,0.75);
      padding: 5px 15px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    #scoreboard {
      right: 10px;
      font-size: 1rem;
      background: rgba(0,0,0,0.75);
      padding: 10px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 220px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    /* Mobile Controls */
    #mobile-controls {
      display: none;
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    .joystick-container {
      position: absolute;
      bottom: 40px;
      width: 120px;
      height: 120px;
      background: rgba(0,0,0,0.15);
      border: 2px solid rgba(0,0,0,0.4);
      border-radius: 50%;
      pointer-events: auto;
      touch-action: none;
      transition: background-color 0.15s, border-color 0.15s;
    }
    /* Hiệu ứng làm sáng khi người dùng chạm giữ */
    .joystick-container.active {
      background: rgba(0,0,0,0.3);
      border-color: rgba(0,0,0,0.7);
    }
    #move-joystick {
      left: 40px;
    }
    #shoot-joystick {
      right: 40px;
    }
    .joystick-knob {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 50%;
      top: 35px;
      left: 35px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: background-color 0.15s;
    }
    .joystick-container.active .joystick-knob {
      background: rgba(0, 0, 0, 0.7);
    }

    /* End Screen */
    #end-screen-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    #end-scoreboard {
      background: #2c3e50;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- MÀN HÌNH CHÍNH (LOBBY) -->
  <div id="lobby-screen" class="screen">
    <h1>TANK WAR ONLINE</h1>
    <div class="panel">
      <input type="text" id="username-input" placeholder="Nhập tên của bạn..." maxlength="12">
      <hr style="margin: 15px 0; opacity: 0.1;">
      <button id="btn-create-room">Tạo Phòng Mới</button>
      <div style="margin: 10px 0; font-size: 0.9rem; color: #aaa;">HOẶC</div>
      <input type="text" id="room-code-input" placeholder="Nhập mã phòng..." style="text-transform: uppercase;">
      <button id="btn-join-room" class="secondary">Tham Gia Phòng</button>
    </div>
  </div>

  <!-- MÀN HÌNH CHỜ (WAITING ROOM) -->
  <div id="waiting-screen" class="screen hidden">
    <h1 style="font-size: 2rem;">PHÒNG CHỜ</h1>
    <div class="panel">
      <h3 style="margin-bottom: 5px;">Mã phòng: <span id="display-room-code" style="color: #ecc94b;">-----</span></h3>
      <div class="player-list" id="waiting-player-list">
        <!-- Danh sách người chơi render từ Firebase -->
      </div>
      
      <div id="host-controls" class="hidden">
        <label for="match-duration" style="font-size: 0.9rem; color: #ccc; display: block; text-align: left;">Thời gian trận đấu (Phút):</label>
        <select id="match-duration">
          <option value="180">3 Phút</option>
          <option value="300" selected>5 Phút</option>
          <option value="480">8 Phút</option>
          <option value="600">10 Phút</option>
        </select>
        <button id="btn-start-game">BẮT ĐẦU TRẬN ĐẤU</button>
      </div>
      <div id="client-wait-msg" style="margin: 15px 0; color: #ecc94b; font-size: 0.9rem;">
        Đang đợi chủ phòng bắt đầu trận đấu...
      </div>
      <button id="btn-leave-lobby" style="background: #e74c3c;">Thoát phòng</button>
    </div>
  </div>

  <!-- MÀN HÌNH TRONG TRẬN (GAMEPLAY) -->
  <div id="game-screen" class="screen hidden" style="padding: 0; background: #111;">
    <div id="game-container">
      <canvas id="gameCanvas" width="960" height="720"></canvas>
      
      <!-- HUD hiển thị thông tin -->
      <div class="hud" id="timer-display">00:00</div>
      <div class="hud" id="scoreboard">
        <div style="border-bottom: 1px solid rgba(255,255,255,0.3); margin-bottom: 5px; padding-bottom: 3px;">BẢNG ĐIỂM</div>
        <div id="scoreboard-entries"></div>
      </div>

      <!-- Điều khiển cảm ứng di động được nâng cấp -->
      <div id="mobile-controls">
        <div class="joystick-container" id="move-joystick">
          <div class="joystick-knob" id="move-knob"></div>
        </div>
        <div class="joystick-container" id="shoot-joystick">
          <div class="joystick-knob" id="shoot-knob"></div>
        </div>
      </div>

      <!-- Màn hình kết quả (Popup cuối trận) -->
      <div id="end-screen-overlay" class="hidden">
        <h1 style="color: #ecc94b;">KẾT THÚC TRẬN</h1>
        <div id="end-scoreboard"></div>
        <button id="btn-back-to-lobby" style="width: auto; padding: 12px 30px;">Quay Lại Phòng Chờ</button>
      </div>
    </div>
  </div>

  <!-- Tích hợp Firebase Realtime Database -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, onDisconnect, runTransaction, remove } 
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtuUEaAX3cMSAMJwzCkXTuScAz4oaUS-w",
      authDomain: "monopolian-5b6a9.firebaseapp.com",
      databaseURL: "https://monopolian-5b6a9-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "monopolian-5b6a9",
      storageBucket: "monopolian-5b6a9.firebasestorage.app",
      messagingSenderId: "381162782318",
      appId: "1:381162782318:web:c03527d35e32d76f98707f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- TẢI & TỰ ĐỘNG TÁCH NỀN ẢNH VỤ NỔ (FADE OUT CARO KHUNG TRẮNG) ---
    const explosionImg = new Image();
    explosionImg.src = "explosion.png"; // Lưu ảnh trong cùng thư mục [1]
    let processedExplosionImg = null;
    let isExplosionImgLoaded = false;

    explosionImg.onload = () => {
      removeCheckerboardBackground(explosionImg, (processed) => {
        processedExplosionImg = processed;
        isExplosionImgLoaded = true;
      });
    };

    function removeCheckerboardBackground(img, callback) {
      try {
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = img.width;
        tempCanvas.height = img.height;
        tempCtx.drawImage(img, 0, 0);
        
        const imgData = tempCtx.getImageData(0, 0, img.width, img.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          
          const diffRG = Math.abs(r - g);
          const diffGB = Math.abs(g - b);
          const diffRB = Math.abs(r - b);
          
          if (diffRG < 15 && diffGB < 15 && diffRB < 15) {
            if (r > 115) {
              data[i + 3] = 0; 
            }
          }
        }
        
        tempCtx.putImageData(imgData, 0, 0);
        
        const processedImg = new Image();
        processedImg.src = tempCanvas.toDataURL();
        processedImg.onload = () => {
          callback(processedImg);
        };
      } catch (err) {
        console.warn("Không thể tách nền tự động do bảo mật CORS khi chạy file offline. Sử dụng thuật toán blending thay thế.", err);
        callback(img);
      }
    }

    const explosionFrames = [
      { sx: 0.25, sy: 0.15, sw: 0.5,  sh: 0.65 }, 
      { sx: 0.08, sy: 0.1,  sw: 0.25, sh: 0.3  }, 
      { sx: 0.6,  sy: 0.05, sw: 0.28, sh: 0.32 }, 
      { sx: 0.08, sy: 0.55, sw: 0.3,  sh: 0.36 }, 
      { sx: 0.6,  sy: 0.6,  sw: 0.28, sh: 0.32 }  
    ];

    // --- BIẾN TRẠNG THÁI GAME ---
    let myId = "player_" + Math.random().toString(36).substring(2, 9);
    let myName = localStorage.getItem("tank_username") || "Tanker_" + Math.floor(Math.random() * 900 + 100);
    document.getElementById("username-input").value = myName;

    let currentRoomId = null;
    let isHost = false;
    let playersData = {};
    let powerupsData = {};
    let projectilesData = {};
    let localProjectiles = []; 
    let localExplosions = [];  
    let gameState = "lobby"; 
    let lobbyPlayers = {};
    let mapSeed = "default";
    let gameDuration = 300; 
    let endTimeStamp = 0;
    
    // Bản đồ
    let maze = { cols: 12, rows: 9, cellWidth: 80, cellHeight: 80 };
    let walls = []; 

    // Biến tạo hiệu ứng rung lắc màn hình (Screen Shake)
    let screenShake = 0;

    // Biến điều khiển Xe tăng Local
    let localTank = {
      x: 100,
      y: 100,
      angle: 0,
      turretAngle: 0,
      vx: 0,
      vy: 0,
      speed: 2.5,
      radius: 16,
      score: 0,
      isDead: false,
      shieldUntil: 0,
      ammo: 3,
      maxAmmo: 3,
      lastShotTime: 0,
      powerup: null, 
      powerupUntil: 0
    };

    // Chu kỳ hồi đạn local
    setInterval(() => {
      if (gameState === "playing" && !localTank.isDead) {
        if (localTank.powerup === 'rapid_fire') {
          localTank.ammo = 3;
        } else if (localTank.ammo < localTank.maxAmmo) {
          localTank.ammo++;
        }
      }
    }, 1200);

    // Biến Input điều khiển
    const keys = {};
    let mousePos = { x: 0, y: 0 };
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
    if (isMobile) {
      document.getElementById("mobile-controls").style.display = "block";
    }

    // --- MÁY PHÁT SỐ NGẪU NHIÊN THEO SEED (PRNG) ---
    function createPRNG(seedString) {
      let h = 1779033703 ^ seedString.length;
      for (let i = 0; i < seedString.length; i++) {
        h = Math.imul(h ^ seedString.charCodeAt(i), 3432918353);
        h = h << 13 | h >>> 19;
      }
      return function() {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        return ((h ^= h >>> 16) >>> 0) / 4294967296;
      };
    }

    // --- KHỞI TẠO BẢN ĐỒ MAZE ---
    function generateMaze(seed) {
      const rand = createPRNG(seed);
      const cols = maze.cols;
      const rows = maze.rows;
      const cw = maze.cellWidth;
      const ch = maze.cellHeight;

      let visited = Array(cols).fill().map(() => Array(rows).fill(false));
      let hWalls = Array(cols).fill().map(() => Array(rows + 1).fill(true));
      let vWalls = Array(cols + 1).fill().map(() => Array(rows).fill(true));

      let stack = [];
      let cx = 0, cy = 0;
      visited[cx][cy] = true;
      stack.push({x: cx, y: cy});

      while(stack.length > 0) {
        let current = stack[stack.length - 1];
        let neighbors = [];
        let dirs = [
          {dx: 0, dy: -1, wallType: 'h', wx: current.x, wy: current.y}, 
          {dx: 1, dy: 0, wallType: 'v', wx: current.x + 1, wy: current.y}, 
          {dx: 0, dy: 1, wallType: 'h', wx: current.x, wy: current.y + 1}, 
          {dx: -1, dy: 0, wallType: 'v', wx: current.x, wy: current.y} 
        ];

        for(let d of dirs) {
          let nx = current.x + d.dx;
          let ny = current.y + d.dy;
          if(nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited[nx][ny]) {
            neighbors.push({nx, ny, d});
          }
        }

        if(neighbors.length > 0) {
          let chosenIdx = Math.floor(rand() * neighbors.length);
          let chosen = neighbors[chosenIdx];
          if(chosen.d.wallType === 'h') hWalls[chosen.d.wx][chosen.d.wy] = false;
          if(chosen.d.wallType === 'v') vWalls[chosen.d.wx][chosen.d.wy] = false;
          visited[chosen.nx][chosen.ny] = true;
          stack.push({x: chosen.nx, y: chosen.ny});
        } else {
          stack.pop();
        }
      }

      for(let x = 1; x < cols; x++) {
        for(let y = 1; y < rows; y++) {
          if(hWalls[x][y] && rand() < 0.35) hWalls[x][y] = false;
          if(vWalls[x][y] && rand() < 0.35) vWalls[x][y] = false;
        }
      }

      let segments = [];
      const width = cols * cw;
      const height = rows * ch;

      segments.push({x1: 0, y1: 0, x2: width, y2: 0});
      segments.push({x1: width, y1: 0, x2: width, y2: height});
      segments.push({x1: width, y1: height, x2: 0, y2: height});
      segments.push({x1: 0, y1: height, x2: 0, y2: 0});

      for(let x=0; x<cols; x++) {
        for(let y=1; y<rows; y++) {
          if(hWalls[x][y]) segments.push({x1: x*cw, y1: y*ch, x2: (x+1)*cw, y2: y*ch});
        }
      }
      for(let x=1; x<cols; x++) {
        for(let y=0; y<rows; y++) {
          if(vWalls[x][y]) segments.push({x1: x*cw, y1: y*ch, x2: x*cw, y2: (y+1)*ch});
        }
      }

      walls = segments;
    }

    // --- XỬ LÝ VA CHẠM (COLLISION) ---
    function getClosestPointOnSegment(cx, cy, x1, y1, x2, y2) {
      let abx = x2 - x1;
      let aby = y2 - y1;
      let acx = cx - x1;
      let acy = cy - y1;
      let abLenSq = abx*abx + aby*aby;
      if (abLenSq === 0) return {x: x1, y: y1};
      let t = (acx*abx + acy*aby) / abLenSq;
      t = Math.max(0, Math.min(1, t));
      return { x: x1 + t * abx, y: y1 + t * aby };
    }

    function checkCollisionWithWalls(objX, objY, r) {
      let correctedX = objX;
      let correctedY = objY;
      let collided = false;

      for (let wall of walls) {
        let pt = getClosestPointOnSegment(correctedX, correctedY, wall.x1, wall.y1, wall.x2, wall.y2);
        let dx = correctedX - pt.x;
        let dy = correctedY - pt.y;
        let distSq = dx*dx + dy*dy;
        if (distSq < r * r && distSq > 0) {
          collided = true;
          let dist = Math.sqrt(distSq);
          let overlap = r - dist;
          correctedX += (dx / dist) * overlap;
          correctedY += (dy / dist) * overlap;
        }
      }
      return { x: correctedX, y: correctedY, collided };
    }

    // --- ĐỒNG BỘ HOÁ FIREBASE LOBBY & GAME ---
    const lobbyScreen = document.getElementById("lobby-screen");
    const waitingScreen = document.getElementById("waiting-screen");
    const gameScreen = document.getElementById("game-screen");

    document.getElementById("btn-create-room").onclick = () => {
      const inputName = document.getElementById("username-input").value.trim();
      if(!inputName) return alert("Vui lòng nhập tên!");
      myName = inputName;
      localStorage.setItem("tank_username", myName);

      const roomId = "ROOM_" + Math.floor(Math.random()*9000 + 1000);
      isHost = true;
      currentRoomId = roomId;
      mapSeed = Math.random().toString(36).substring(2, 9).toUpperCase();

      const roomRef = ref(db, `tankGame/rooms/${roomId}`);
      set(roomRef, {
        state: {
          active: false,
          mapSeed: mapSeed,
          duration: 300,
          hostId: myId
        },
        players: {
          [myId]: { name: myName, score: 0, isDead: true }
        }
      }).then(() => {
        setupRoomListeners(roomId);
        showScreen("waiting");
      });
    };

    document.getElementById("btn-join-room").onclick = () => {
      const inputName = document.getElementById("username-input").value.trim();
      const inputRoom = document.getElementById("room-code-input").value.trim().toUpperCase();
      if(!inputName || !inputRoom) return alert("Vui lòng điền đủ Tên và Mã phòng!");
      myName = inputName;
      localStorage.setItem("tank_username", myName);

      const roomRef = ref(db, `tankGame/rooms/${inputRoom}`);
      onValue(roomRef, (snapshot) => {
        if(!snapshot.exists()) {
          alert("Phòng không tồn tại!");
          return;
        }
        const data = snapshot.val();
        if(data.state && data.state.active) {
          alert("Trận đấu trong phòng này đã bắt đầu rồi!");
          return;
        }
        
        currentRoomId = inputRoom;
        isHost = false;
        
        const playerRef = ref(db, `tankGame/rooms/${inputRoom}/players/${myId}`);
        set(playerRef, { name: myName, score: 0, isDead: true }).then(() => {
          setupRoomListeners(inputRoom);
          showScreen("waiting");
        });
      }, { onlyOnce: true });
    };

    document.getElementById("btn-leave-lobby").onclick = () => {
      if(currentRoomId) {
        remove(ref(db, `tankGame/rooms/${currentRoomId}/players/${myId}`)).then(() => {
          location.reload();
        });
      }
    };

    document.getElementById("btn-start-game").onclick = () => {
      if(!isHost) return;
      const duration = parseInt(document.getElementById("match-duration").value) || 300;
      const startTime = Date.now();
      const endTime = startTime + (duration * 1000);

      update(ref(db, `tankGame/rooms/${currentRoomId}/state`), {
        active: true,
        duration: duration,
        endTime: endTime
      });

      onValue(ref(db, `tankGame/rooms/${currentRoomId}/players`), (snap) => {
        const pList = snap.val();
        if(pList) {
          const updates = {};
          const rand = createPRNG(mapSeed);
          Object.keys(pList).forEach(pid => {
            const rx = Math.floor(rand() * (maze.cols - 2) + 1) * maze.cellWidth + maze.cellWidth/2;
            const ry = Math.floor(rand() * (maze.rows - 2) + 1) * maze.cellHeight + maze.cellHeight/2;
            updates[`players/${pid}/x`] = rx;
            updates[`players/${pid}/y`] = ry;
            updates[`players/${pid}/angle`] = 0;
            updates[`players/${pid}/turretAngle`] = 0;
            updates[`players/${pid}/score`] = 0;
            updates[`players/${pid}/isDead`] = false;
            updates[`players/${pid}/shieldUntil`] = Date.now() + 2000; 
          });
          update(ref(db, `tankGame/rooms/${currentRoomId}`), updates);
        }
      }, { onlyOnce: true });
    };

    function setupRoomListeners(roomId) {
      document.getElementById("display-room-code").innerText = roomId;

      const myPlayerRef = ref(db, `tankGame/rooms/${roomId}/players/${myId}`);
      onDisconnect(myPlayerRef).remove();

      onValue(ref(db, `tankGame/rooms/${roomId}/state`), (snapshot) => {
        const state = snapshot.val();
        if (!state) return;
        mapSeed = state.mapSeed || "default";
        generateMaze(mapSeed);

        if(state.active && gameState !== "playing") {
          endTimeStamp = state.endTime;
          startGameLoop();
        } else if(!state.active && gameState === "playing") {
          endGame();
        }

        if(state.hostId === myId) {
          isHost = true;
          document.getElementById("host-controls").classList.remove("hidden");
          document.getElementById("client-wait-msg").classList.add("hidden");
        } else {
          isHost = false;
          document.getElementById("host-controls").classList.add("hidden");
          document.getElementById("client-wait-msg").classList.remove("hidden");
        }
      });

      onValue(ref(db, `tankGame/rooms/${roomId}/players`), (snapshot) => {
        const players = snapshot.val() || {};
        playersData = players;
        lobbyPlayers = players;

        const waitingListDiv = document.getElementById("waiting-player-list");
        waitingListDiv.innerHTML = "";
        Object.keys(players).forEach(pid => {
          const div = document.createElement("div");
          div.className = "player-item";
          const isMeLabel = pid === myId ? " (Bạn)" : "";
          div.innerHTML = `<span>${players[pid].name}${isMeLabel}</span> <span style="color: #2ecc71;">Sẵn sàng</span>`;
          waitingListDiv.appendChild(div);
        });

        updateScoreboard();
      });

      onValue(ref(db, `tankGame/rooms/${roomId}/powerups`), (snapshot) => {
        powerupsData = snapshot.val() || {};
      });

      onValue(ref(db, `tankGame/rooms/${roomId}/projectiles`), (snapshot) => {
        projectilesData = snapshot.val() || {};
        syncProjectiles();
      });
    }

    function showScreen(screenName) {
      lobbyScreen.classList.add("hidden");
      waitingScreen.classList.add("hidden");
      gameScreen.classList.add("hidden");
      if(screenName === "lobby") lobbyScreen.classList.remove("hidden");
      if(screenName === "waiting") waitingScreen.classList.remove("hidden");
      if(screenName === "playing") gameScreen.classList.remove("hidden");
    }

    // --- LOGIC HỒI SINH XE TĂNG ---
    function respawnLocalTank() {
      const rand = createPRNG(Math.random().toString());
      const rx = Math.floor(rand() * (maze.cols - 2) + 1) * maze.cellWidth + maze.cellWidth/2;
      const ry = Math.floor(rand() * (maze.rows - 2) + 1) * maze.cellHeight + maze.cellHeight/2;

      localTank.x = rx;
      localTank.y = ry;
      localTank.isDead = false;
      localTank.shieldUntil = Date.now() + 2000; 
      localTank.powerup = null;

      update(ref(db, `tankGame/rooms/${currentRoomId}/players/${myId}`), {
        x: rx,
        y: ry,
        isDead: false,
        shieldUntil: localTank.shieldUntil,
        powerup: null
      });
    }

    // --- ĐIỀU KHIỂN & INPUTS ---
    window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener("keyup", (e) => { 
      keys[e.key.toLowerCase()] = false; 
      if(e.key === " " || e.key === "Spacebar") {
        fireActiveWeapon();
      }
    });

    window.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mousePos.x = (e.clientX - rect.left) * scaleX;
      mousePos.y = (e.clientY - rect.top) * scaleY;
    });

    window.addEventListener("mousedown", (e) => {
      if(gameState === "playing" && e.button === 0 && !isMobile) {
        fireActiveWeapon();
      }
    });

    // --- ĐIỀU KHIỂN CẢM ỨNG DI ĐỘNG NÂNG CẤP (MULTI-TOUCH IDENTIFIER LOCK) ---
    let moveTouchId = null;
    let shootTouchId = null;

    let moveJoyStart = null;
    let moveJoyPos = { x: 0, y: 0 };
    let shootJoyStart = null;
    let shootJoyPos = { x: 0, y: 0 };

    const moveJoystick = document.getElementById("move-joystick");
    const moveKnob = document.getElementById("move-knob");
    const shootJoystick = document.getElementById("shoot-joystick");
    const shootKnob = document.getElementById("shoot-knob");

    // 1. Joystick Di chuyển (Bên Trái)
    moveJoystick.addEventListener("touchstart", (e) => {
      if (moveTouchId !== null) return; // Đang xử lý vuốt từ trước
      const touch = e.changedTouches[0];
      moveTouchId = touch.identifier;
      moveJoystick.classList.add("active");
      
      const rect = moveJoystick.getBoundingClientRect();
      moveJoyStart = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      updateMove(touch);
    }, {passive: true});

    moveJoystick.addEventListener("touchmove", (e) => {
      if (moveTouchId === null) return;
      // Tìm đúng ngón tay đã bắt đầu điều khiển joystick di chuyển
      for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === moveTouchId) {
          updateMove(e.touches[i]);
          break;
        }
      }
    }, {passive: true});

    function updateMove(touch) {
      if (!moveJoyStart) return;
      let dx = touch.clientX - moveJoyStart.x;
      let dy = touch.clientY - moveJoyStart.y;
      const dist = Math.min(45, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx);
      moveJoyPos = { x: Math.cos(angle) * dist, y: Math.sin(angle) * dist };
      moveKnob.style.transform = `translate(${moveJoyPos.x}px, ${moveJoyPos.y}px)`;
    }

    const resetMoveJoystick = (e) => {
      if (moveTouchId === null) return;
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === moveTouchId) {
          moveTouchId = null;
          moveJoyStart = null;
          moveJoyPos = { x: 0, y: 0 };
          moveKnob.style.transform = "translate(0, 0)";
          moveJoystick.classList.remove("active");
          break;
        }
      }
    };
    moveJoystick.addEventListener("touchend", resetMoveJoystick, {passive: true});
    moveJoystick.addEventListener("touchcancel", resetMoveJoystick, {passive: true});


    // 2. Joystick Ngắm bắn & Nhả để bắn (Bên Phải)
    shootJoystick.addEventListener("touchstart", (e) => {
      if (shootTouchId !== null) return;
      const touch = e.changedTouches[0];
      shootTouchId = touch.identifier;
      shootJoystick.classList.add("active");

      const rect = shootJoystick.getBoundingClientRect();
      shootJoyStart = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      updateShoot(touch);
    }, {passive: true});

    shootJoystick.addEventListener("touchmove", (e) => {
      if (shootTouchId === null) return;
      for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === shootTouchId) {
          updateShoot(e.touches[i]);
          break;
        }
      }
    }, {passive: true});

    function updateShoot(touch) {
      if (!shootJoyStart) return;
      let dx = touch.clientX - shootJoyStart.x;
      let dy = touch.clientY - shootJoyStart.y;
      const dist = Math.min(45, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx);
      shootJoyPos = { x: Math.cos(angle) * dist, y: Math.sin(angle) * dist };
      shootKnob.style.transform = `translate(${shootJoyPos.x}px, ${shootJoyPos.y}px)`;
      
      // Đồng bộ góc nòng pháo theo góc vuốt joystick
      localTank.turretAngle = angle;
    }

    const triggerShootAndReset = (e) => {
      if (shootTouchId === null) return;
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === shootTouchId) {
          // Nhả ngón tay ra để kích hoạt bắn (nếu kéo đủ lực tầm xa)
          if (Math.hypot(shootJoyPos.x, shootJoyPos.y) > 12) {
            fireActiveWeapon();
          }
          shootTouchId = null;
          shootJoyStart = null;
          shootJoyPos = { x: 0, y: 0 };
          shootKnob.style.transform = "translate(0, 0)";
          shootJoystick.classList.remove("active");
          break;
        }
      }
    };
    shootJoystick.addEventListener("touchend", triggerShootAndReset, {passive: true});
    shootJoystick.addEventListener("touchcancel", triggerShootAndReset, {passive: true});

    // --- HỆ THỐNG VŨ KHÍ & PHÁT ĐẠN ---
    function fireActiveWeapon() {
      if (localTank.isDead || gameState !== "playing") return;

      const now = Date.now();
      const minCooldown = localTank.powerup === 'rapid_fire' ? 120 : 300; 
      if (now - localTank.lastShotTime < minCooldown) return;

      if (localTank.powerup !== 'rapid_fire' && localTank.ammo <= 0) return;

      const spawnDist = localTank.radius + 12; 
      const bulletX = localTank.x + Math.cos(localTank.turretAngle) * spawnDist;
      const bulletY = localTank.y + Math.sin(localTank.turretAngle) * spawnDist;

      // Ném bom không kích: dội 3 quả bom ngẫu nhiên tại 3 điểm khác nhau cùng 1 lúc [1]
      if (localTank.powerup === 'airstrike') {
        const rand = createPRNG(Math.random().toString());
        for (let k = 0; k < 3; k++) {
          const cellX = Math.floor(rand() * (maze.cols - 2) + 1);
          const cellY = Math.floor(rand() * (maze.rows - 2) + 1);
          const targetX = cellX * maze.cellWidth + maze.cellWidth / 2;
          const targetY = cellY * maze.cellHeight + maze.cellHeight / 2;
          
          pushProjectileFirebase('airstrike', 0, 0, 0, targetX, targetY);
        }
        consumeWeapon();
        return;
      }

      // Súng Laser xuyên phá
      if (localTank.powerup === 'laser') {
        const laserCooldown = 1000; 
        if (now - localTank.lastShotTime < laserCooldown) return;
        pushProjectileFirebase('laser', bulletX, bulletY, localTank.turretAngle);
        localTank.lastShotTime = now;
        return;
      }

      // Tên lửa tầm nhiệt
      if (localTank.powerup === 'missile') {
        pushProjectileFirebase('missile', bulletX, bulletY, localTank.turretAngle);
        consumeWeapon();
        return;
      }

      // Đạn cơ bản thường
      pushProjectileFirebase('normal', bulletX, bulletY, localTank.turretAngle);
      if (localTank.powerup !== 'rapid_fire') {
        localTank.ammo--;
      }
      localTank.lastShotTime = now;
    }

    function consumeWeapon() {
      localTank.powerup = null;
      localTank.powerupUntil = 0;
      update(ref(db, `tankGame/rooms/${currentRoomId}/players/${myId}`), { powerup: null });
    }

    function pushProjectileFirebase(type, startX, startY, angle = 0, targetX = 0, targetY = 0) {
      const pRef = ref(db, `tankGame/rooms/${currentRoomId}/projectiles`);
      const newProjRef = push(pRef);
      set(newProjRef, {
        id: newProjRef.key,
        type: type,
        ownerId: myId,
        x: startX,
        y: startY,
        angle: angle,
        targetX: targetX,
        targetY: targetY,
        createdAt: Date.now()
      });
    }

    function syncProjectiles() {
      Object.keys(projectilesData).forEach(id => {
        if(!localProjectiles.some(lp => lp.id === id)) {
          const p = projectilesData[id];
          const age = (Date.now() - p.createdAt) / 1000; 
          
          let lp = {
            id: p.id,
            type: p.type,
            ownerId: p.ownerId,
            x: p.x,
            y: p.y,
            angle: p.angle,
            targetX: p.targetX,
            targetY: p.targetY,
            bounces: 0,
            active: true
          };

          if (p.type === 'normal') {
            const speed = 400; 
            lp.vx = Math.cos(p.angle) * speed;
            lp.vy = Math.sin(p.angle) * speed;
            lp.x += lp.vx * age;
            lp.y += lp.vy * age;
          } else if(p.type === 'missile') {
            const speed = 250;
            lp.vx = Math.cos(p.angle) * speed;
            lp.vy = Math.sin(p.angle) * speed;
            lp.x += lp.vx * age;
            lp.y += lp.vy * age;
          } else if(p.type === 'laser') {
            lp.duration = 0.15; 
            lp.laserEndTime = Date.now() + 150;
            executeLaserHit(lp);
          } else if(p.type === 'airstrike') {
            lp.duration = 3.0; 
            lp.explodeAt = Date.now() + 3000;
          }

          localProjectiles.push(lp);
        }
      });
    }

    function executeLaserHit(laser) {
      const length = 1200;
      const lx2 = laser.x + Math.cos(laser.angle) * length;
      const ly2 = laser.y + Math.sin(laser.angle) * length;

      Object.keys(playersData).forEach(pid => {
        if(playersData[pid].isDead) return;
        if(pid === myId && Date.now() < localTank.shieldUntil) return; 
        if(pid !== myId && playersData[pid].shieldUntil && Date.now() < playersData[pid].shieldUntil) return;

        const px = playersData[pid].x;
        const py = playersData[pid].y;
        const pt = getClosestPointOnSegment(px, py, laser.x, laser.y, lx2, ly2);
        const dist = Math.hypot(px - pt.x, py - pt.y);

        if(dist < 18 + 5) { 
          createExplosionLocal(px, py, 75); 
          
          if (pid === myId) {
            damagePlayer(pid, laser.ownerId, px, py);
          }
        }
      });
    }

    // --- THỰC HIỆN GÂY SÁT THƯƠNG ---
    function damagePlayer(victimId, attackerId, x, y) {
      if (victimId === myId) {
        if (Date.now() < localTank.shieldUntil) return; 

        localTank.isDead = true;
        createExplosionLocal(localTank.x, localTank.y, 75);

        let pRef = ref(db, `tankGame/rooms/${currentRoomId}/players/${myId}`);
        update(pRef, { isDead: true, score: Math.max(-5, localTank.score - 1) });

        if (attackerId && attackerId !== myId) {
          let attRef = ref(db, `tankGame/rooms/${currentRoomId}/players/${attackerId}/score`);
          runTransaction(attRef, (currentScore) => {
            return (currentScore || 0) + 1;
          });
        }

        setTimeout(() => {
          if (gameState === "playing") respawnLocalTank();
        }, 2000);
      }
    }

    // --- TẠO HIỆU ỨNG VỤ NỔ CHÂN THỰC & RUNG MÀN HÌNH ---
    function createExplosionLocal(x, y, maxRadius = 50) {
      screenShake = Math.min(18, screenShake + maxRadius * 0.22);

      // Vụ nổ trung tâm chính
      localExplosions.push({
        x: x,
        y: y,
        r: 10,
        maxR: maxRadius,
        life: 1.0,
        decay: 0.04,
        angle: Math.random() * Math.PI * 2,
        frameIdx: 0 
      });

      // Tạo các vụ nổ nhỏ văng ra xung quanh tương ứng ảnh spritesheet mẫu [1]
      const particleCount = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < particleCount; i++) {
        const offsetAngle = Math.random() * Math.PI * 2;
        const offsetDist = Math.random() * (maxRadius * 0.5);
        localExplosions.push({
          x: x + Math.cos(offsetAngle) * offsetDist,
          y: y + Math.sin(offsetAngle) * offsetDist,
          r: 5,
          maxR: maxRadius * (0.35 + Math.random() * 0.4),
          life: 1.0,
          decay: 0.03 + Math.random() * 0.03,
          angle: Math.random() * Math.PI * 2,
          frameIdx: 1 + Math.floor(Math.random() * 4) 
        });
      }
    }

    // --- CHU KỲ PHÁT SINH HỘP TIẾP TẾ (VỚI THUẬT TOÁN CÂN BẰNG SMART BALANCER) ---
    function runHostSystems() {
      if(!isHost || gameSta
